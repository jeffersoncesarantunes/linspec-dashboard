<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LinSpec Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font: 'JetBrains Mono', 'Fira Code', monospace;
      --bg: #2e3440;
      --bg-card: #3b4252;
      --fg: #eceff4;
      --fg2: #d8dee9;
      --fg3: #4c566a;
      --border: #4c566a;
      --green: #a3be8c;
      --yellow: #ebcb8b;
      --red: #bf616a;
      --blue: #81a1c1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    h1 { font-family: var(--font); font-size: 1.4rem; margin-bottom: 20px; }
    h2 { font-family: var(--font); font-size: 1.1rem; margin-bottom: 12px; }
    nav {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 20px;
      font-family: var(--font);
      font-size: 0.85rem;
    }
    nav a { color: var(--blue); text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .value { font-family: var(--font); font-size: 1.6rem; font-weight: 700; }
    .stat-card .label { font-size: 0.78rem; color: var(--fg3); margin-top: 4px; }
    .stat-card .green { color: var(--green); }
    .stat-card .yellow { color: var(--yellow); }
    .stat-card .red { color: var(--red); }
    .stat-card .blue { color: var(--blue); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--border);
      font-family: var(--font);
      font-size: 0.75rem;
      color: var(--fg3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    tr:hover td { background: var(--bg-card); }
    .badge {
      display: inline-block;
      font-family: var(--font);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 600;
    }
    .badge.pass { background: var(--green); color: #1d1e20; }
    .badge.warn { background: var(--yellow); color: #1d1e20; }
    .badge.fail { background: var(--red); color: #1d1e20; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .score-bar {
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      margin-top: 4px;
    }
    .score-bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .fill.green { background: var(--green); }
    .fill.yellow { background: var(--yellow); }
    .fill.red { background: var(--red); }
  </style>
</head>
<body>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/admin/setup">API Key</a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
